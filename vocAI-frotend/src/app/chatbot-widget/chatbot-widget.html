@if (!hideWidget) {
<button class="chatbot-fab" (click)="toggleChat()" aria-label="Abrir chat">
    @if (!isOpen) {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path
            d="M21 11.5a8.38 8.38 0 0 1-1.9 5.4 8.5 8.5 0 0 1-6.6 3.1 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 3.1-6.6 8.38 8.38 0 0 1 5.4-1.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
    </svg>
    } @else {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6 6 18M6 6l12 12" />
    </svg>
    }
</button>

@if (isOpen) {
<div class="chatbot-panel">
    <div class="chatbot-header">
        <span>Asistente Vocacional</span>
    </div>

    <div class="chatbot-messages" #messagesContainer>
        @for (msg of messages; track $index) {
        <div class="message" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
            {{ msg.text }}
        </div>
        }
        @if (isLoading) {
        <div class="message assistant typing">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        }
    </div>

    <div class="chatbot-input">
        <input type="text" placeholder="Escribe tu pregunta..." [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
            [disabled]="isLoading" />
        <button (click)="sendMessage()" [disabled]="isLoading || !userInput.trim()">
            Enviar
        </button>
    </div>
</div>
}
}
